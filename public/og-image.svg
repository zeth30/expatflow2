<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img">
<title>ReadyExpat Berlin — Anmeldung in English</title>

<!-- Background -->
<rect width="1200" height="630" fill="#0f172a"/>

<!-- Subtle grid -->
<defs>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="1"/>
  </pattern>
</defs>
<rect width="1200" height="630" fill="url(#grid)" opacity="0.6"/>

<!-- Blue glow top right -->
<ellipse cx="950" cy="120" rx="320" ry="200" fill="#0075FF" opacity="0.07"/>

<!-- Left accent bar -->
<rect x="0" y="0" width="6" height="630" fill="#0075FF"/>

<!-- Logo mark -->
<rect x="60" y="60" width="52" height="52" rx="12" fill="#0075FF"/>
<text x="86" y="97" text-anchor="middle" font-family="Arial,sans-serif" font-size="28" font-weight="900" fill="white">R</text>

<!-- Brand name -->
<text x="128" y="86" font-family="Arial,sans-serif" font-size="22" font-weight="800" fill="white">ReadyExpat</text>
<text x="128" y="108" font-family="Arial,sans-serif" font-size="16" font-weight="400" fill="#0075FF" letter-spacing="2">BERLIN</text>

<!-- Main headline -->
<text x="60" y="220" font-family="Arial,sans-serif" font-size="72" font-weight="900" fill="white" letter-spacing="-2">German</text>
<text x="60" y="305" font-family="Arial,sans-serif" font-size="72" font-weight="900" fill="#0075FF" letter-spacing="-2">Paperwork.</text>
<text x="60" y="390" font-family="Arial,sans-serif" font-size="72" font-weight="900" fill="white" letter-spacing="-2">Solved.</text>

<!-- Sub headline -->
<text x="60" y="450" font-family="Arial,sans-serif" font-size="24" font-weight="400" fill="#64748b">Your official Anmeldung form — 54 fields, perfectly in German.</text>
<text x="60" y="482" font-family="Arial,sans-serif" font-size="24" font-weight="400" fill="#64748b">Every nationality. 5 minutes. €15.</text>

<!-- Price pill -->
<rect x="60" y="530" width="130" height="44" rx="22" fill="#0075FF"/>
<text x="125" y="558" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="800" fill="white">€15 once</text>

<!-- Zero storage pill -->
<rect x="206" y="530" width="200" height="44" rx="22" fill="#1e293b" stroke="#334155" stroke-width="1"/>
<text x="306" y="558" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="#94a3b8">0 bytes stored</text>

<!-- Right side illustration: document stack -->
<g transform="translate(820, 100)">
  <!-- Shadow doc -->
  <rect x="30" y="30" width="300" height="400" rx="12" fill="#1e293b" opacity="0.7" transform="rotate(6,180,230)"/>
  <!-- Main doc -->
  <rect x="20" y="20" width="300" height="400" rx="12" fill="white" transform="rotate(-3,170,220)"/>
  <!-- Doc lines -->
  <rect x="56" y="80" width="220" height="8" rx="4" fill="#e2e8f0" transform="rotate(-3,170,220)"/>
  <rect x="56" y="100" width="180" height="8" rx="4" fill="#e2e8f0" transform="rotate(-3,170,220)"/>
  <rect x="56" y="120" width="200" height="8" rx="4" fill="#e2e8f0" transform="rotate(-3,170,220)"/>
  <rect x="56" y="150" width="160" height="8" rx="4" fill="#bfdbfe" transform="rotate(-3,170,220)"/>
  <rect x="56" y="170" width="210" height="8" rx="4" fill="#e2e8f0" transform="rotate(-3,170,220)"/>
  <rect x="56" y="190" width="175" height="8" rx="4" fill="#e2e8f0" transform="rotate(-3,170,220)"/>
  <rect x="56" y="220" width="190" height="8" rx="4" fill="#bfdbfe" transform="rotate(-3,170,220)"/>
  <rect x="56" y="240" width="155" height="8" rx="4" fill="#e2e8f0" transform="rotate(-3,170,220)"/>
  <!-- Stamp -->
  <rect x="160" y="290" width="100" height="70" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="3" transform="rotate(-3,170,220)"/>
  <text x="210" y="325" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="900" fill="#16a34a" transform="rotate(-3,170,220)">BEREIT</text>
  <text x="210" y="343" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#16a34a" transform="rotate(-3,170,220)">✓ Anmeldung</text>
</g>

<!-- Tagline bottom right -->
<text x="1140" y="590" text-anchor="end" font-family="Arial,sans-serif" font-size="16" fill="#334155">readyexpat.de</text>
</svg>
